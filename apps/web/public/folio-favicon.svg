<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="leftFacet" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6d28d9" />
      <stop offset="100%" stop-color="#4f46e5" />
    </linearGradient>
    <linearGradient id="rightFacet" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0ea5e9" />
      <stop offset="100%" stop-color="#22d3ee" />
    </linearGradient>
    <linearGradient id="ridgeHighlight" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#a5f3fc" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#67e8f9" stop-opacity="0.4" />
    </linearGradient>
  </defs>
  <!-- Circle base -->
  <circle cx="16" cy="16" r="15" fill="#0f0e13" />
  <!-- Left facet (shadow side) — violet gradient -->
  <polygon points="16,4 8,8 8,24 16,28" fill="url(#leftFacet)" />
  <!-- Right facet (light side) — teal gradient -->
  <polygon points="16,4 24,8 24,24 16,28" fill="url(#rightFacet)" />
  <!-- F letter — top bar (split by ridge) -->
  <polygon points="11,6 16,4.5 16,9 11,10.5" fill="url(#leftFacet)" />
  <polygon points="16,4.5 20,6 20,10.5 16,9" fill="url(#rightFacet)" />
  <!-- F letter — top horizontal bar -->
  <polygon points="9,7 11,6 11,10.5 9,11.5" fill="url(#leftFacet)" />
  <polygon points="11,6 16,4.5 16,9 11,10.5" fill="url(#ridgeHighlight)" />
  <!-- F letter — middle horizontal bar -->
  <polygon points="9,13 11,12 11,15.5 9,16.5" fill="url(#leftFacet)" />
  <polygon points="11,12 16,10.5 16,14 11,15.5" fill="url(#rightFacet)" />
  <!-- F letter — vertical stem -->
  <polygon points="9,7 11,6 11,20 9,21" fill="url(#leftFacet)" />
  <!-- Ridge highlight along center line -->
  <line x1="16" y1="4.5" x2="16" y2="28" stroke="url(#ridgeHighlight)" stroke-width="0.6" stroke-opacity="0.7" />
  <!-- Subtle top-left specular highlight -->
  <ellipse cx="10" cy="10" rx="2.5" ry="1.5" fill="white" fill-opacity="0.08" transform="rotate(-20 10 10)" />
</svg>